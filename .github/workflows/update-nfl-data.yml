name: Update NFL data

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nfl-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install data packages
        run: pip install -r requirements.txt

      - name: Download NFL data
        run: python -m src.collect_nfl_data

      - name: Build roster snapshot
        run: python -m src.build_2026_roster

      - name: Build expected starters
        run: python -m src.build_expected_starters

      - name: Build historical features
        run: python -m src.build_features

      - name: Build upcoming features
        run: python -m src.build_upcoming_features

      - name: Commit changed game features
        run: |
          git config user.name "NFL Data Updater"
          git config user.email "actions@users.noreply.github.com"
          git add -f data/processed/upcoming_features_2026.parquet
          if git diff --cached --quiet; then
            echo "NFL features are already current."
          else
            git commit -m "Update NFL data"
            git push
          fi
